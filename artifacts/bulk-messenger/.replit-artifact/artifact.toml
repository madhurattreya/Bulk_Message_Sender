kind = "web"
previewPath = "/"
title = "Bulk Messenger"
version = "1.0.0"
id = "artifacts/bulk-messenger"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19416

[services.development]
run = "pnpm --filter @workspace/bulk-messenger run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bulk-messenger", "run", "build" ]
publicDir = "artifacts/bulk-messenger/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19416"
BASE_PATH = "/"
